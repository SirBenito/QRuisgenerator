<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Wit-Gele Kruis</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wgk: {
                            blue: '#00193c',
                            yellow: '#ffc800',
                            light: '#f4f7fb'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- QR Code Styling Library -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <style>
        body { background-color: #f4f7fb; }
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 3px rgba(0, 25, 60, 0.15);
            border-color: #00193c;
        }
        .qr-container canvas, .qr-container svg {
            border-radius: 20px;
            box-shadow: 0 12px 30px -10px rgba(0, 25, 60, 0.15);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .qr-container:hover canvas, .qr-container:hover svg {
            transform: scale(1.03);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="bg-wgk-blue text-white shadow-md relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMiIgZmlsbD0iI2ZmZiIvPjwvc3ZnPg==')]"></div>
        <div class="max-w-6xl mx-auto px-6 py-5 relative z-10 flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-md transform -rotate-3">
                <i class="fa-solid fa-plus text-wgk-yellow text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Slimme QR Generator</h1>
                <p class="text-wgk-yellow text-xs font-medium">Wit-Gele Kruis Stijl</p>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        <div class="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden animate-fade-in-up flex flex-col md:flex-row">
            
            <!-- Instellingen (Links) -->
            <div class="w-full md:w-1/2 p-8 lg:p-10 border-b md:border-b-0 md:border-r border-gray-100 flex flex-col gap-8 justify-center">
                <div>
                    <h2 class="text-xl font-bold text-wgk-blue mb-1">QR Code Instellingen</h2>
                    <p class="text-xs text-gray-500">De QR-code en het ingebouwde logo passen zich direct en live aan.</p>
                </div>

                <!-- URL Input -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-gray-500 flex items-center gap-2">
                        <i class="fa-solid fa-link text-wgk-blue"></i> Bestemmingslink
                    </label>
                    <div class="border-2 border-gray-200 rounded-xl px-4 py-3 flex items-center gap-3 input-focus-ring transition-colors bg-gray-50">
                        <input type="text" id="urlInput" placeholder="Plak hier je link (bijv. https://...)" 
                               class="bg-transparent border-none outline-none w-full text-sm text-gray-700 placeholder-gray-400"
                               value="https://www.witgelekruis.be">
                    </div>
                </div>

                <!-- Kleur Input -->
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-gray-500 flex items-center gap-2">
                        <i class="fa-solid fa-palette text-wgk-blue"></i> Kleur QR &amp; Logo
                    </label>
                    <div class="flex items-center gap-4">
                        <input type="color" id="colorInput" value="#00193c" 
                               class="w-14 h-14 rounded-xl cursor-pointer border-2 border-gray-200 p-1 bg-white hover:scale-105 transition-transform">
                        <div class="flex flex-col">
                            <span class="text-sm font-semibold text-gray-700" id="colorHex">#00193c</span>
                            <span class="text-xs text-gray-400">Klik op het palet om te wijzigen</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview & Download (Rechts) -->
            <div class="w-full md:w-1/2 p-8 lg:p-10 bg-wgk-light flex flex-col items-center justify-center relative">
                <div class="absolute top-6 right-6 flex gap-2">
                    <span class="bg-wgk-yellow text-wgk-blue text-xs font-bold px-3 py-1 rounded-full shadow-sm">Live Preview</span>
                </div>
                
                <!-- QR Container -->
                <div id="qrCodeContainer" class="qr-container bg-white p-5 rounded-3xl shadow-sm mb-8">
                    <!-- QR code wordt hier gegenereerd -->
                </div>

                <!-- Download Knoppen -->
                <div class="flex gap-4 w-full max-w-xs">
                    <button id="downloadPng" class="flex-1 bg-wgk-blue hover:bg-[#002a5c] text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 text-sm">
                        <i class="fa-solid fa-download"></i> PNG
                    </button>
                    <button id="downloadSvg" class="flex-1 bg-white hover:bg-gray-50 border-2 border-wgk-blue text-wgk-blue font-semibold py-3 px-4 rounded-xl shadow-md transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2 text-sm">
                        <i class="fa-solid fa-vector-square"></i> SVG
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- Dynamisch SVG-logo (Wit-Gele Kruis op basis van aangeleverde vector) ---
        // Genereert live een base64 SVG-logo in de geselecteerde kleur
        function getSvgLogo(color) {
            const svgString = `<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 100.1 100.1">
              <path id="symbol_logo" fill="${color}" d="M100.1,36.5v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1-1.4-3.1-3.1v-16.5c0-26,21.1-47.1,47.1-47.1h16.6c1.7,0,3.1,1.4,3.1,3.1ZM5.9,66.7c22.5,0,31-34.3,60.8-36.8V3.1c0-1.7-1.4-3.1-3.1-3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1H3.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7,1.4,3.1,3.1,3.1h2.8Z"/>
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
        }
        
        let qrCode = null;
        let typingTimer;

        // UI Elementen
        const urlInput = document.getElementById('urlInput');
        const colorInput = document.getElementById('colorInput');
        const colorHex = document.getElementById('colorHex');
        const qrContainer = document.getElementById('qrCodeContainer');

        // Hoofdfunctie om de QR te updaten / genereren
        function updateQR() {
            const rawUrl = urlInput.value.trim() || "https://www.witgelekruis.be";
            const color = colorInput.value;
            colorHex.textContent = color.toUpperCase();

            // Genereer het dynamic gekleurde logo
            const logo = getSvgLogo(color);

            if (!qrCode) {
                // Eerste initialisatie van de QR-code styling library
                qrCode = new QRCodeStyling({
                    width: 260,
                    height: 260,
                    type: "svg", // Render direct als SVG in de DOM
                    data: rawUrl,
                    margin: 4,
                    qrOptions: {
                        typeNumber: 0,
                        mode: "Byte",
                        errorCorrectionLevel: "Q" // Nodig om het logo veilig in het midden te tonen
                    },
                    imageOptions: {
                        hideBackgroundDots: true,
                        imageSize: 0.35,
                        margin: 5,
                        crossOrigin: "anonymous",
                    },
                    dotsOptions: {
                        color: color,
                        type: "rounded" // Afgeronde QR-blokjes
                    },
                    backgroundOptions: {
                        color: "#ffffff",
                    },
                    image: logo,
                    cornersSquareOptions: {
                        color: color,
                        type: "extra-rounded" // Afgeronde buitenste hoeken
                    },
                    cornersDotOptions: {
                        color: color,
                        type: "dot"
                    }
                });
                qrCode.append(qrContainer);
            } else {
                // Real-time update van de QR-code met het nieuw gekleurde logo
                qrCode.update({
                    data: rawUrl,
                    dotsOptions: {
                        color: color
                    },
                    cornersSquareOptions: {
                        color: color
                    },
                    cornersDotOptions: {
                        color: color
                    },
                    image: logo
                });
            }
        }

        // --- Event Listeners ---

        // Debounce typ-vertraging
        urlInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(updateQR, 150);
        });

        // Directe update bij kleurselectie
        colorInput.addEventListener('input', updateQR);

        // Download Acties
        document.getElementById('downloadPng').addEventListener('click', () => {
            if(qrCode) qrCode.download({ name: "wgk-qr-code", extension: "png" });
        });

        document.getElementById('downloadSvg').addEventListener('click', () => {
            // Vind het live gegenereerde SVG element in de container
            const svgEl = qrContainer.querySelector('svg');
            
            if (svgEl) {
                // Maak een kopie zodat we de actieve preview niet verstoren
                const svgClone = svgEl.cloneNode(true);
                const imgEl = svgClone.querySelector('image');
                
                // Als de library een <image> element heeft geplaatst voor ons logo, 
                // vervangen we deze door een echt vector <g> element
                if (imgEl) {
                    const x = imgEl.getAttribute('x') || "81";
                    const y = imgEl.getAttribute('y') || "81";
                    const width = imgEl.getAttribute('width') || "98";
                    const height = imgEl.getAttribute('height') || "98";
                    
                    // Bereken de schaalverhouding gebaseerd op de originele viewBox (0 0 100.1 100.1)
                    const scaleX = parseFloat(width) / 100.1;
                    const scaleY = parseFloat(height) / 100.1;
                    const activeColor = colorInput.value;
                    
                    // Maak een nieuwe SVG-groep aan
                    const logoGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    logoGroup.setAttribute("transform", `translate(${x}, ${y}) scale(${scaleX}, ${scaleY})`);
                    logoGroup.setAttribute("id", "wgk-logo-vector");
                    
                    // Maak het vectorpad aan van het Wit-Gele Kruis logo
                    const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pathEl.setAttribute("fill", activeColor);
                    pathEl.setAttribute("d", "M100.1,36.5v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1-1.4-3.1-3.1v-16.5c0-26,21.1-47.1,47.1-47.1h16.6c1.7,0,3.1,1.4,3.1,3.1ZM5.9,66.7c22.5,0,31-34.3,60.8-36.8V3.1c0-1.7-1.4-3.1-3.1-3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1H3.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7,1.4,3.1,3.1,3.1h2.8Z");
                    
                    logoGroup.appendChild(pathEl);
                    
                    // Vervang de raster/base64 afbeelding door onze schone vectorgroep
                    imgEl.parentNode.replaceChild(logoGroup, imgEl);
                }
                
                // Serialiseer de gekloonde SVG naar een XML-string
                const serializer = new XMLSerializer();
                let svgString = serializer.serializeToString(svgClone);
                
                // Voeg de XML-declaratie toe voor maximale compatibiliteit in editors (Illustrator, Inkscape etc)
                if (!svgString.startsWith('<?xml')) {
                    svgString = '<?xml version="1.0" standalone="no"?>\r\n' + svgString;
                }
                
                // Exporteer en start download
                const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "wgk-qr-code.svg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } else {
                // Fallback naar de standaard bibliotheek download mocht de DOM SVG niet gevonden worden
                if(qrCode) qrCode.download({ name: "wgk-qr-code", extension: "svg" });
            }
        });

        // Eerste opstart van de generator
        updateQR();

    </script>
</body>
</html>
