    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wgk: {
                            blue: '#00193c',
                            yellow: '#ffc300',
                            cream: '#fcf8ec',
                            light: '#f4f7fb'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['lettertype', 'Space Grotesk', 'Inter', 'sans-serif']

    <style>
        @font-face {
            font-family: 'lettertype';
            src: url('lettertype.ttf') format('truetype');
            font-weight: 100 900;
        }

        body {
            background-color: #fcf8ec;
            color: #00193c;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overscroll-behavior-y: contain;
        }

        .font-title {
            font-family: 'lettertype', 'Space Grotesk', 'Inter', sans-serif;
            letter-spacing: -0.02em;
        }

        .wgk-input {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .wgk-input:focus-within {
            border-color: #00193c;
            box-shadow: 0 0 0 3px rgba(0, 25, 60, 0.1);
        }

        .qr-container svg {
            border-radius: 16px;
            transition: transform 0.3s ease;
        }
        
        .qr-container:hover svg {
            transform: scale(1.02);
        }

        /* Gefixte Smoother Toggle Switch */
        .toggle-checkbox:checked + .toggle-label {
            background-color: #00193c;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(24px);
        }
        
        /* Color Swatches */
        .color-swatch {
            transition: transform 0.15s ease, border-width 0.15s ease;
        }
        .color-swatch.active {
            border: 3px solid #00193c;
            transform: scale(1.15);
        }

        /* Verberg scrollbars volledig */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="antialiased py-10 px-4 md:px-8 flex flex-col items-center">

    <main class="w-full max-w-6xl relative z-10 flex-grow">
        
        <div class="flex items-center gap-4 mb-12 select-none">
            <div class="w-14 h-14 bg-wgk-yellow rounded-2xl flex items-center justify-center shadow-lg shadow-wgk-yellow/20 flex-shrink-0 transform hover:rotate-3 transition-transform duration-300">
                <i class="fa-solid fa-qrcode text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-wgk-blue mb-0.5 font-title">Wit-Gele QRuis</h1>
                <p class="text-gray-600 font-medium font-sans text-xs md:text-sm">Genereer QR-codes in de WGK-branding</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start mb-16">
            
            <div class="lg:col-span-7 bg-white rounded-[2rem] p-6 md:p-8 shadow-sm flex flex-col gap-8 lg:h-[620px] lg:overflow-y-auto hide-scrollbar relative border border-gray-100/50">

                        <i class="fa-solid fa-link text-gray-400 text-sm"></i>
                        <input type="text" id="urlInput" placeholder="https://..." 
                               class="bg-transparent border-none outline-none w-full text-base text-wgk-blue placeholder-gray-400 font-medium font-sans"
                               value="https://www.witgelekruis.be">
                    </div>
                </div>

                <hr class="border-gray-100">

                <div class="flex flex-col gap-3">
                    <label class="text-xs font-bold uppercase tracking-wider text-wgk-blue font-title">Hoofdkleur</label>
                    <div class="flex items-center gap-4">
                        <div class="relative w-14 h-14 rounded-2xl overflow-hidden border border-gray-200 cursor-pointer group flex-shrink-0">
                            <input type="color" id="mainColorInput" value="#00193c" 
                                   class="absolute inset-0 w-full h-20 -top-2 cursor-pointer opacity-0 z-10">
                            <div id="mainColorPreview" class="w-full h-full"></div>
                        </div>
                        <div class="text-sm font-bold text-wgk-blue font-title" id="mainColorHex">#00193C (BLAUW)</div>
                    </div>
                    <div class="flex flex-wrap gap-2.5 mt-2" id="mainColorPresets"></div>
                </div>

                <hr class="border-gray-100">

                <div class="flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-bold uppercase tracking-wider text-wgk-blue font-title">Achtergrond toevoegen</label>
                        <div class="relative inline-block w-12 mr-2 align-middle select-none">
                            <input type="checkbox" id="bgToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white appearance-none cursor-pointer z-10 opacity-0"/>
                            <label for="bgToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer transition-colors duration-300 ease-in-out relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:w-5 after:h-5 after:bg-white after:rounded-full after:transition-transform after:duration-300 after:ease-in-out"></label>
                        </div>
                    </div>
                    
                    <div id="bgSettings" class="hidden flex-col gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-4">
                            <div class="relative w-12 h-12 rounded-xl overflow-hidden border border-gray-200 cursor-pointer group flex-shrink-0">
                                <input type="color" id="bgColorInput" value="#ffc300" 
                                       class="absolute inset-0 w-full h-20 -top-2 cursor-pointer opacity-0 z-10">
                                <div id="bgColorPreview" class="w-full h-full"></div>
                            </div>
                            <div class="text-sm font-bold text-wgk-blue font-title" id="bgColorHex">#FFC300 (GEEL)</div>
                        </div>
                        <div class="flex flex-wrap gap-2.5 mt-1" id="bgColorPresets"></div>
                    </div>
                </div>

                <hr class="border-gray-100">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-wider text-wgk-blue font-title">Vorm QR Patroon</label>
                        <div class="relative">
                            <select id="dotsStyle" class="w-full wgk-input bg-gray-50/50 rounded-2xl px-4 py-3.5 text-sm font-medium outline-none cursor-pointer pr-10 text-wgk-blue">
                                <option value="dots" selected>Stipjes</option>
                                <option value="rounded">Afgerond</option>
                                <option value="square">Vierkantjes</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-wgk-blue pointer-events-none text-xs"></i>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold uppercase tracking-wider text-wgk-blue font-title">Vorm Hoeken (Buiten)</label>
                        <div class="relative">
                            <select id="cornerOuterStyle" class="w-full wgk-input bg-gray-50/50 rounded-2xl px-4 py-3.5 text-sm font-medium outline-none cursor-pointer pr-10 text-wgk-blue">
                                <option value="extra-rounded" selected>Afgerond</option>
                                <option value="rounded">Rond</option>
                                <option value="square">Vierkant</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-wgk-blue pointer-events-none text-xs"></i>
                        </div>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-5 bg-white rounded-[2rem] p-8 shadow-sm flex flex-col items-center justify-between border border-gray-100/50 lg:h-[620px] sticky top-10">

                <div class="w-full flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg text-wgk-blue font-title">Preview</h2>
                    <span class="bg-green-50 text-green-700 border border-green-100 text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live
                    </span>
                </div>
                
                <div id="qrCodeContainer" class="qr-container p-4 bg-gray-50/50 rounded-2xl border border-gray-100/50 w-full flex items-center justify-center aspect-square mb-6">
                    </div>

                <div class="flex flex-col gap-3 w-full mt-auto">
                    <button onclick="downloadCustomQR('png')" class="w-full bg-wgk-blue text-white font-bold py-3.5 px-6 rounded-full shadow-sm hover:shadow-md transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 group text-sm font-title">
                        <i class="fa-solid fa-download"></i> Download PNG
                    </button>
                    <button onclick="downloadCustomQR('svg')" class="w-full bg-wgk-yellow text-wgk-blue font-bold py-3.5 px-6 rounded-full shadow-sm hover:shadow-md transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 text-sm font-title">
                        <i class="fa-solid fa-vector-square"></i> Download SVG (Vector)
                    </button>
                </div>
            </div>
        </div>

        </div>
        <p class="font-medium text-wgk-blue">❤︎ Met liefde gemaakt door Benito en een vleugje AI.</p>
    </footer>

    <script>
        // --- Kleuren Data met Geordende Volgorde en Labels ---
        const WGK_COLORS = [
            { name: 'WIT', hex: '#ffffff' },
            { name: 'GEEL', hex: '#ffc300' },
            { name: 'BLAUW', hex: '#00193c' },
            { name: 'PAARS', hex: '#e1e1ff' },
            { name: 'LICHT BLAUW', hex: '#c8e6ff' },
            { name: 'GROEN', hex: '#e6f5a0' },
            { name: 'TAUPE', hex: '#f0e6dc' },
            { name: 'ROZE', hex: '#fa9187' },
            { name: 'GEEL TINT', hex: '#fff6dc' }
        ];

        const wgkPathData = "M100.1,36.5v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1h-27.1c-1.7,0-3.1-1.4-3.1-3.1v-16.5c0-26,21.1-47.1,47.1-47.1h16.6c1.7,0,3.1,1.4,3.1,3.1ZM5.9,66.7c22.5,0,31-34.3,60.8-36.8V3.1c0-1.7-1.4-3.1-3.1-3.1h-27.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7-1.4,3.1-3.1,3.1H3.1c-1.7,0-3.1,1.4-3.1,3.1v27.1c0,1.7,1.4,3.1,3.1,3.1h2.8Z";
        
        function getSvgLogo(color) {
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100.1 100.1"><path fill="${color}" d="${wgkPathData}"/></svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
        }
        
        let qrCode = null;
        let typingTimer;
        const QR_SIZE = 280;
        const QR_MARGIN = 15;

        // UI Elementen
        const urlInput = document.getElementById('urlInput');
        const mainColorInput = document.getElementById('mainColorInput');
        const mainColorPreview = document.getElementById('mainColorPreview');
        const mainColorHex = document.getElementById('mainColorHex');
        const mainColorPresets = document.getElementById('mainColorPresets');
        
        const bgToggle = document.getElementById('bgToggle');
        const bgSettings = document.getElementById('bgSettings');
        const bgColorInput = document.getElementById('bgColorInput');
        const bgColorPreview = document.getElementById('bgColorPreview');
        const bgColorHex = document.getElementById('bgColorHex');
        const bgColorPresets = document.getElementById('bgColorPresets');
        
        const dotsStyle = document.getElementById('dotsStyle');
        const cornerOuterStyle = document.getElementById('cornerOuterStyle');
        const qrContainer = document.getElementById('qrCodeContainer');

        // Initialiseer Kleur Presets
        function initPresets(container, inputEl) {
            WGK_COLORS.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `w-7 h-7 rounded-full border border-gray-200 color-swatch`;
                btn.style.backgroundColor = color.hex;
                btn.title = color.name;
                
                btn.onclick = () => {
                    inputEl.value = color.hex;
                    updateQR();
                };
                container.appendChild(btn);
            });
        }
        
        initPresets(mainColorPresets, mainColorInput);
        initPresets(bgColorPresets, bgColorInput);

        function getColorName(hex) {
            const found = WGK_COLORS.find(c => c.hex.toLowerCase() === hex.toLowerCase());
            return found ? ` (${found.name})` : '';
        }

        function updateActiveSwatches() {
            [mainColorPresets, bgColorPresets].forEach((container, idx) => {
                const activeColor = idx === 0 ? mainColorInput.value.toLowerCase() : bgColorInput.value.toLowerCase();
                Array.from(container.children).forEach(btn => {
                    const hexFromRgb = rgbToHex(btn.style.backgroundColor);
                    if (hexFromRgb === activeColor) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            });
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb.toLowerCase();
            const rgbArr = rgb.match(/\d+/g);
            if (!rgbArr) return '#ffffff';
            return '#' + rgbArr.map(x => parseInt(x).toString(16).padStart(2, '0')).join('').toLowerCase();
        }

        // Hoofd QR Update Functie
        function updateQR() {
            const rawUrl = urlInput.value.trim() || "https://www.witgelekruis.be";
            const mainColor = mainColorInput.value;
            const isBgActive = bgToggle.checked;
            const bgColor = isBgActive ? bgColorInput.value : "transparent";
            const dotType = dotsStyle.value;
            const outerStyle = cornerOuterStyle.value;
            
            // Update UI & Toegankelijke labels
            mainColorHex.textContent = `${mainColor.toUpperCase()}${getColorName(mainColor)}`;
            mainColorPreview.style.backgroundColor = mainColor;
            bgColorHex.textContent = `${bgColorInput.value.toUpperCase()}${getColorName(bgColorInput.value)}`;
            bgColorPreview.style.backgroundColor = bgColorInput.value;
            bgSettings.style.display = isBgActive ? 'flex' : 'none';
            updateActiveSwatches();

            const logoBase64 = getSvgLogo(mainColor);

            const options = {
                width: QR_SIZE,
                height: QR_SIZE,
                type: "svg",
                data: rawUrl,
                margin: QR_MARGIN,
                qrOptions: { mode: "Byte", errorCorrectionLevel: "H" },
                imageOptions: { hideBackgroundDots: true, imageSize: 0.35, margin: 8 },
                dotsOptions: { color: mainColor, type: dotType },
                backgroundOptions: { color: bgColor },
                image: logoBase64,
                cornersSquareOptions: { color: mainColor, type: outerStyle },
                cornersDotOptions: { color: mainColor, type: "dot" }
            };

            if (!qrCode) {
                qrCode = new QRCodeStyling(options);
                qrCode.append(qrContainer);
            } else {
                qrCode.update(options);
            }

            setTimeout(() => { postProcessSVG(mainColor, isBgActive); }, 50);
        }

        function postProcessSVG(mainColor, isBgActive) {
            const svgEl = qrContainer.querySelector('svg');
            if (!svgEl) return;

            const bgRect = svgEl.querySelector('rect[fill]');
            if (bgRect) {
                if (isBgActive) {
                    bgRect.setAttribute('rx', '24');
                    bgRect.setAttribute('ry', '24');
                } else {
                    bgRect.removeAttribute('rx');
                    bgRect.removeAttribute('ry');
                }
            }

            const oldCenter = svgEl.querySelector('#wgk-center-logo');
            if (oldCenter) oldCenter.remove();

            const imgEl = svgEl.querySelector('image');
            if(imgEl) {
                const imgX = imgEl.getAttribute('x');
                const imgY = imgEl.getAttribute('y');
                const imgW = imgEl.getAttribute('width');
                
                if (imgX && imgW && imgW !== "0") {
                    const imgScale = parseFloat(imgW) / 100.1;
                    const centerLogoPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    centerLogoPath.setAttribute("d", wgkPathData);
                    centerLogoPath.setAttribute("fill", mainColor); 
                    centerLogoPath.setAttribute("transform", `translate(${parseFloat(imgX)}, ${parseFloat(imgY)}) scale(${imgScale})`);
                    
                    const centerGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    centerGroup.setAttribute("id", "wgk-center-logo");
                    centerGroup.appendChild(centerLogoPath);
                    svgEl.appendChild(centerGroup);
                    
                    imgEl.style.display = 'none'; 
                }
            }
        }

        function downloadCustomQR(type) {
            const svgEl = qrContainer.querySelector('svg');
            if (!svgEl) return;

            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgEl);

            if (!svgString.startsWith('<?xml')) {
                svgString = '<?xml version="1.0" standalone="no"?>\r\n' + svgString;
            }

            if (type === 'svg') {
                const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                triggerDownload(url, 'wgk-qr.svg');
                URL.revokeObjectURL(url);
            } 
            else if (type === 'png') {
                const canvas = document.createElement("canvas");
                const scaleFactor = 4;
                canvas.width = QR_SIZE * scaleFactor;
                canvas.height = QR_SIZE * scaleFactor;
                const ctx = canvas.getContext("2d");

                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const pngUrl = canvas.toDataURL("image/png");
                    triggerDownload(pngUrl, "wgk-qr.png");
                };
                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
            }
        }

        function triggerDownload(url, filename) {
            const link = document.createElement("a");
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Event Listeners
        urlInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(updateQR, 200);
        });

        mainColorInput.addEventListener('input', updateQR);
        bgColorInput.addEventListener('input', updateQR);
        bgToggle.addEventListener('change', updateQR);
        dotsStyle.addEventListener('change', updateQR);
        cornerOuterStyle.addEventListener('change', updateQR);

        // Init
        updateQR();
    </script>
